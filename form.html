<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Report</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <script src="js/auth.js"></script>
    <script>
        if (!Auth.guard()) { /* redirecting */ }
    </script>

<nav class="navbar">
    <div class="logo" style="display: flex; align-items: center;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
        WeeklyTracker
    </div>
    <ul class="nav-links">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="form.html" class="active">Submit Report</a></li>
        <li><a href="tracker.html">Tracker</a></li>
        <li><a href="teams.html">Teams</a></li>
    </ul>
    <div class="navbar-right">
        <button id="sendReportBtn" class="action-btn" style="background: var(--accent); color: white; border-color: var(--accent);">Director Report</button>
        <div class="week-badge" id="weekBadgeNav">—</div>
        <button class="theme-btn" onclick="location.reload()" title="Refresh Dashboard">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                <path d="M3 3v5h5"/>
            </svg>
        </button>
        <button id="themeToggle" class="theme-btn" title="Toggle theme">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
            </svg>
        </button>
        <!-- Profile icon -->
        <div class="profile-avatar" id="profileAvatar" title="">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 1 0-16 0"/>
            </svg>
        </div>
        <button id="logoutBtn" class="action-btn">Logout</button>
    </div>
</nav>

<main class="dashboard">

    <div class="hero-section">
        <h1>Submit Weekly Report</h1>
        <p>Fill your weekly progress report</p>
    </div>

    <section class="tracker-section" style="position: relative;">

        <!-- Auto-fill loader overlay -->
        <div class="form-loading-overlay hidden" id="formLoader">
            <div class="spinner spinner-lg"></div>
            <span>Auto-filling your details…</span>
        </div>

        <div class="card-header" style="padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--bg-elevated); font-size: 14px; font-weight: 600;">Weekly Report Details</div>
        <form id="reportForm" style="padding: 24px;">

            <div class="form-grid-2">
                <div class="form-group">
                    <label>Select Team</label>
                    <select id="teamName" required>
                        <option value="" disabled selected>Choose Team</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Team Leader</label>
                    <input type="text" id="leaderName" readonly placeholder="Auto-filled">
                </div>

                <div class="form-group" style="grid-column: span 2;">
                    <label>Email Address</label>
                    <select id="leaderEmail" required>
                        <option value="" disabled selected>Choose Email</option>
                    </select>
                </div>
            </div>

            <hr class="divider">

            <div class="form-group">
                <label>Work Done This Week</label>
                <textarea id="workDone" rows="4" placeholder="List all completed tasks and key activities..." required></textarea>
            </div>

            <div class="form-group">
                <label>Work In Progress</label>
                <textarea id="wip" rows="4" placeholder="What's currently being worked on but not yet finished?" required></textarea>
            </div>

            <div class="form-group">
                <label>Plans For Next Week</label>
                <textarea id="nextWeekPlan" rows="4" placeholder="What are the main priorities for next week?" required></textarea>
            </div>
            
            <div class="form-group">
                <label>Achievements / Highlights <small style="color:var(--text-muted);font-weight:400;">(Optional)</small></label>
                <textarea id="achievements" rows="3" placeholder="Any major wins, milestones, or positive feedback this week?"></textarea>
            </div>

            <div style="margin-top: 32px; display: flex; justify-content: flex-end;">
                <button type="submit" class="btn-submit" style="width: auto; min-width: 160px;">Submit Report</button>
            </div>
        </form>
        <div id="successMessage" style="display:none; margin-top:20px; padding:15px; border-radius:10px; background:#10b98120; color:#10b981; font-weight:600;">
    ✅ Report submitted successfully!
</div>

    </section>

</main>

<script src="js/app.js"></script>
<script src="js/form.js"></script>
    <script>
        document.getElementById('logoutBtn')?.addEventListener('click', () => Auth.logout());
        Auth.applyRoleUI();

        // Show profile icon with logged-in user's email
        (function () {
            const user = Auth.getUser();
            const avatar = document.getElementById('profileAvatar');
            if (avatar && user.email) {
                avatar.title = user.email;
                avatar.setAttribute('data-email', user.email);
            }
        })();

        // Auto-fill logged-in user's details after teams load
        window.addEventListener('DOMContentLoaded', () => {
            const user      = Auth.getUser();
            const formLoader = document.getElementById('formLoader');

            if (!user.email) return;

            // Show the overlay loader immediately
            if (formLoader) formLoader.classList.remove('hidden');

            let attempts = 0;
            const maxAttempts = 30; // 9 seconds max wait

            const pollAutoFill = setInterval(() => {
                attempts++;
                const teamSelect = document.getElementById('teamName');

                // Stop waiting after max attempts
                if (attempts >= maxAttempts) {
                    clearInterval(pollAutoFill);
                    if (formLoader) formLoader.classList.add('hidden');
                    return;
                }

                // Wait for teams to load into the dropdown
                if (!teamSelect || teamSelect.options.length <= 1) return;

                clearInterval(pollAutoFill);

                // Find matching team by email in data-email attribute
                let matched = false;
                Array.from(teamSelect.options).forEach(opt => {
                    if (opt.dataset.email &&
                        opt.dataset.email.toLowerCase().includes(user.email.toLowerCase())) {
                        teamSelect.value = opt.value;
                        teamSelect.dispatchEvent(new Event('change'));
                        matched = true;
                    }
                });

                // If team matched, auto-select the user's email in the email dropdown
                if (matched) {
                    const pollEmail = setInterval(() => {
                        const emailDropdown = document.getElementById('leaderEmail');
                        if (!emailDropdown || emailDropdown.options.length <= 1) return;
                        clearInterval(pollEmail);
                        Array.from(emailDropdown.options).forEach(opt => {
                            if (opt.value.toLowerCase() === user.email.toLowerCase()) {
                                emailDropdown.value = opt.value;
                            }
                        });
                    }, 100);
                }

                // If no team matched, check if it's an independent user
                // (email in sessionStorage but not in any team) — select Independent option
                if (!matched) {
                    const indepOpt = Array.from(teamSelect.options).find(
                        o => o.value === '__independent__'
                    );
                    if (indepOpt) {
                        teamSelect.value = '__independent__';
                        teamSelect.dispatchEvent(new Event('change'));
                    }
                    // Pre-fill the email field with the logged-in email
                    setTimeout(() => {
                        const emailDropdown = document.getElementById('leaderEmail');
                        if (emailDropdown) {
                            // For independent mode the email field becomes a text input
                            // handled by form.js — just set if it's a select with matching option
                            Array.from(emailDropdown.options || []).forEach(opt => {
                                if (opt.value.toLowerCase() === user.email.toLowerCase()) {
                                    emailDropdown.value = opt.value;
                                }
                            });
                        }
                    }, 400);
                }

                // Hide the loader after a short delay to allow change event to finish
                setTimeout(() => {
                    if (formLoader) formLoader.classList.add('hidden');
                }, matched ? 800 : 0);

            }, 300);
        });
    </script>

</body>
</html>
